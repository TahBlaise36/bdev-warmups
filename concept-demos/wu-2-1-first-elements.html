<!DOCTYPE html>
<!-- WU 2.1 · Your first HTML elements — BDev Academy concept demo -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S2 · WU 2.1 — First HTML elements</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
  :root {
    --ink:#0A0A0B; --bone:#FAF9F6; --terra:#E2562B;
    --code-bg:#1A1A2E; --code-text:#E2E8F0;
    --line:#E6E2DA; --text-dim:#605D57;
    --tg:#7DD3FC; --str:#A5D6A7; --cm:#7A8699;
  }
  * { box-sizing:border-box; margin:0; }
  body {
    font-family:'Inter',system-ui,sans-serif; color:var(--ink);
    background:#ECEAE4; line-height:1.6; -webkit-font-smoothing:antialiased;
    min-height:100vh; display:grid; place-items:center; padding:48px 32px;
  }
  .demo { width:100%; max-width:860px; }
  .label {
    font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:500;
    letter-spacing:.14em; text-transform:uppercase; color:var(--terra);
    margin-bottom:14px; display:block;
  }
  .card {
    border-radius:16px; overflow:hidden; border:1px solid var(--line);
    box-shadow:0 12px 40px rgba(10,10,11,.10); background:#fff;
  }
  .split { display:grid; grid-template-columns:1fr 1fr; }
  .panel-head {
    font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.1em;
    text-transform:uppercase; padding:12px 20px; border-bottom:1px solid;
  }
  .code {
    background:var(--code-bg); color:var(--code-text);
    font-family:'JetBrains Mono',monospace; font-size:13.5px; line-height:1.75;
  }
  .code .panel-head { color:#8A93B8; border-color:rgba(255,255,255,.08); }
  .code pre { padding:22px 20px; margin:0; white-space:pre-wrap; }
  .tg { color:var(--tg); }
  .result { background:var(--bone); }
  .result .panel-head { color:var(--text-dim); border-color:var(--line); }
  .render { padding:22px 24px; }
  iframe.render-frame { width:100%; border:0; display:block; background:#fff; }
  .caption {
    margin-top:20px; text-align:center; color:var(--text-dim);
    font-size:15px; max-width:640px; margin-left:auto; margin-right:auto;
  }
  @media (max-width:640px){ .split{ grid-template-columns:1fr; } }
</style>
</head>
<body>
  <div class="demo">
    <span class="label">S2 · WU 2.1</span>
    <div class="card">
      <div class="split">
        <div class="code">
          <div class="panel-head">index.html</div>
<pre><span class="tg">&lt;h1&gt;</span>Sokoa<span class="tg">&lt;/h1&gt;</span>
<span class="tg">&lt;p&gt;</span>Cameroon's friendly marketplace.<span class="tg">&lt;/p&gt;</span>
<span class="tg">&lt;p&gt;</span>Pay with <span class="tg">&lt;strong&gt;</span>MoMo<span class="tg">&lt;/strong&gt;</span> or
<span class="tg">&lt;em&gt;</span>cash on delivery<span class="tg">&lt;/em&gt;</span>.<span class="tg">&lt;/p&gt;</span></pre>
        </div>
        <div class="result">
          <div class="panel-head">Browser output</div>
          <iframe class="render-frame" title="Rendered output" height="200"
            srcdoc="&lt;body style='margin:16px 20px;font-family:Georgia,serif'&gt;&lt;h1&gt;Sokoa&lt;/h1&gt;&lt;p&gt;Cameroon's friendly marketplace.&lt;/p&gt;&lt;p&gt;Pay with &lt;strong&gt;MoMo&lt;/strong&gt; or &lt;em&gt;cash on delivery&lt;/em&gt;.&lt;/p&gt;&lt;/body&gt;"></iframe>
        </div>
      </div>
    </div>
    <p class="caption">Four tags. A heading, two paragraphs, bold, italic. This is HTML.</p>
  </div>
</body>
</html>
