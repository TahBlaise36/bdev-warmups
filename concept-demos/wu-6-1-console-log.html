<!DOCTYPE html>
<!-- WU 6.1 · Run your first script — BDev Academy concept demo -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S6 · WU 6.1 — Run your first script</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
  :root {
    --ink:#0A0A0B; --bone:#FAF9F6; --terra:#E2562B;
    --code-bg:#1A1A2E; --code-text:#E2E8F0; --term-bg:#0D1117;
    --line:#E6E2DA; --text-dim:#605D57;
    --kw:#C792EA; --str:#9ECE6A; --num:#FF9E64; --fn:#82AAFF; --cm:#7A8699; --prop:#7DD3FC;
  }
  * { box-sizing:border-box; margin:0; }
  body {
    font-family:'Inter',system-ui,sans-serif; color:var(--ink);
    background:#ECEAE4; line-height:1.6; -webkit-font-smoothing:antialiased;
    min-height:100vh; display:grid; place-items:center; padding:48px 32px;
  }
  .demo { width:100%; max-width:880px; }
  .label {
    font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:500;
    letter-spacing:.14em; text-transform:uppercase; color:var(--terra);
    margin-bottom:14px; display:block;
  }
  .card {
    border-radius:16px; overflow:hidden; border:1px solid var(--line);
    box-shadow:0 12px 40px rgba(10,10,11,.10);
  }
  .split { display:grid; grid-template-columns:1fr 1fr; }
  .panel-head {
    font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.1em;
    text-transform:uppercase; padding:12px 20px; display:flex; align-items:center; gap:8px;
  }
  .dots { display:flex; gap:5px; }
  .dots i { width:9px; height:9px; border-radius:50%; display:block; }
  .code { background:var(--code-bg); }
  .code .panel-head { color:#8A93B8; border-bottom:1px solid rgba(255,255,255,.08); }
  .code pre {
    padding:22px 20px; margin:0; white-space:pre-wrap;
    font-family:'JetBrains Mono',monospace; font-size:13.5px; line-height:1.85; color:var(--code-text);
  }
  .term { background:var(--term-bg); }
  .term .panel-head { color:#586069; border-bottom:1px solid rgba(255,255,255,.06); }
  .term-body {
    padding:22px 20px; font-family:'JetBrains Mono',monospace;
    font-size:13.5px; line-height:1.95; color:#C9D1D9;
  }
  .term-body .ln { display:flex; gap:10px; }
  .term-body .ln::before { content:">"; color:#34D399; font-weight:700; }
  .kw{color:var(--kw)} .str{color:var(--str)} .num{color:var(--num)}
  .fn{color:var(--fn)} .cm{color:var(--cm)} .prop{color:var(--prop)}
  .caption {
    margin-top:20px; text-align:center; color:var(--text-dim);
    font-size:15px; max-width:640px; margin-left:auto; margin-right:auto;
  }
  @media (max-width:640px){ .split{ grid-template-columns:1fr; } }
</style>
</head>
<body>
  <div class="demo">
    <span class="label">S6 · WU 6.1</span>
    <div class="card">
      <div class="split">
        <div class="code">
          <div class="panel-head">
            <span class="dots"><i style="background:#FF5F56"></i><i style="background:#FFBD2E"></i><i style="background:#27C93F"></i></span>
            script.js
          </div>
<pre><span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"Hello from Buea!"</span>);
<span class="fn">console</span>.<span class="fn">log</span>(<span class="num">2</span> + <span class="num">2</span>);
<span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"Sokoa has"</span>, <span class="num">500</span>, <span class="str">"products"</span>);</pre>
        </div>
        <div class="term">
          <div class="panel-head">Console</div>
          <div class="term-body">
            <div class="ln">Hello from Buea!</div>
            <div class="ln">4</div>
            <div class="ln">Sokoa has 500 products</div>
          </div>
        </div>
      </div>
    </div>
    <p class="caption">Open DevTools (F12) → Console and paste this. The browser runs it immediately.</p>
  </div>
</body>
</html>
