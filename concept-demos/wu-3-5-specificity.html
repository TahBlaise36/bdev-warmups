<!DOCTYPE html>
<!-- WU 3.5 · Specificity battle — BDev Academy concept demo -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S3 · WU 3.5 — Specificity battle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
  :root {
    --ink:#0A0A0B; --bone:#FAF9F6; --terra:#E2562B; --tint:#FDF1EE;
    --code-bg:#1A1A2E; --code-text:#E2E8F0;
    --line:#E6E2DA; --text-dim:#605D57; --sel:#7DD3FC; --dim-code:#5A6480;
  }
  * { box-sizing:border-box; margin:0; }
  body {
    font-family:'Inter',system-ui,sans-serif; color:var(--ink);
    background:#ECEAE4; line-height:1.6; -webkit-font-smoothing:antialiased;
    min-height:100vh; display:grid; place-items:center; padding:48px 32px;
  }
  .demo { width:100%; max-width:820px; }
  .label {
    font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:500;
    letter-spacing:.14em; text-transform:uppercase; color:var(--terra);
    margin-bottom:14px; display:block;
  }
  .card {
    border-radius:16px; overflow:hidden; border:1px solid var(--line);
    box-shadow:0 12px 40px rgba(10,10,11,.10); background:#fff;
  }
  .row {
    display:grid; grid-template-columns:180px 96px 1fr; align-items:center;
    gap:20px; padding:22px 24px; border-bottom:1px solid var(--line);
  }
  .row:last-child { border-bottom:0; }
  .btn-demo {
    justify-self:center; color:#fff; border:0; border-radius:9px;
    padding:11px 24px; font-family:'Space Grotesk',sans-serif; font-weight:600;
    font-size:15px; cursor:pointer;
  }
  .b1 { background:#6366F1; } .b2 { background:#34D399; } .b3 { background:#E2562B; }
  .score {
    justify-self:center; font-family:'JetBrains Mono',monospace; font-weight:500;
    font-size:15px; background:var(--tint); color:var(--terra);
    border-radius:6px; padding:6px 12px; letter-spacing:.05em;
  }
  .rules {
    background:var(--code-bg); border-radius:10px; padding:14px 16px;
    font-family:'JetBrains Mono',monospace; font-size:12.5px; line-height:1.7;
    color:var(--dim-code);
  }
  .rules .win { color:var(--code-text); }
  .rules .win .sel { color:var(--sel); font-weight:500; }
  .rules .win::after { content:" ← wins"; color:#34D399; }
  .caption {
    margin-top:20px; text-align:center; color:var(--text-dim);
    font-size:15px; max-width:640px; margin-left:auto; margin-right:auto;
  }
  .caption code { font-family:'JetBrains Mono',monospace; color:var(--terra); font-size:.9em; }
</style>
</head>
<body>
  <div class="demo">
    <span class="label">S3 · WU 3.5</span>
    <div class="card">
      <div class="row">
        <button class="btn-demo b1">Enroll</button>
        <span class="score">0-0-1</span>
        <div class="rules">
          <div class="win"><span class="sel">button</span> { background: #6366F1 }</div>
        </div>
      </div>
      <div class="row">
        <button class="btn-demo b2">Enroll</button>
        <span class="score">0-1-1</span>
        <div class="rules">
          <div>button { background: #6366F1 }</div>
          <div class="win"><span class="sel">.btn</span> { background: #34D399 }</div>
        </div>
      </div>
      <div class="row">
        <button class="btn-demo b3">Enroll</button>
        <span class="score">1-0-1</span>
        <div class="rules">
          <div>button { background: #6366F1 }</div>
          <div>.btn { background: #34D399 }</div>
          <div class="win"><span class="sel">#cta</span> { background: #E2562B }</div>
        </div>
      </div>
    </div>
    <p class="caption">ID <code>(1-0-0)</code> beats class <code>(0-1-0)</code> beats element <code>(0-0-1)</code>. The higher number wins.</p>
  </div>
</body>
</html>
