<!DOCTYPE html>
<!-- WU 2.4 · Links, images, and form fields — BDev Academy concept demo -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S2 · WU 2.4 — Links, images, and forms</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
  :root {
    --ink:#0A0A0B; --bone:#FAF9F6; --terra:#E2562B;
    --line:#E6E2DA; --text-dim:#605D57;
  }
  * { box-sizing:border-box; margin:0; }
  body {
    font-family:'Inter',system-ui,sans-serif; color:var(--ink);
    background:#ECEAE4; line-height:1.6; -webkit-font-smoothing:antialiased;
    min-height:100vh; display:grid; place-items:center; padding:48px 32px;
  }
  .demo { width:100%; max-width:820px; }
  .label {
    font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:500;
    letter-spacing:.14em; text-transform:uppercase; color:var(--terra);
    margin-bottom:14px; display:block;
  }
  .card {
    border-radius:16px; overflow:hidden; border:1px solid var(--line);
    box-shadow:0 12px 40px rgba(10,10,11,.10); background:var(--bone);
    padding:28px 24px;
  }
  .cols { display:flex; gap:24px; }
  .col { flex:1; display:flex; flex-direction:column; }
  .render {
    background:#fff; border:1px solid var(--line); border-radius:10px;
    padding:18px; min-height:120px; display:flex; align-items:center;
    justify-content:center; overflow:hidden;
  }
  iframe.frame { width:100%; border:0; display:block; }
  .tagname {
    font-family:'JetBrains Mono',monospace; font-size:12.5px;
    color:var(--text-dim); text-align:center; margin-top:12px;
  }
  .tagname b { color:var(--terra); font-weight:500; }
  .caption {
    margin-top:22px; text-align:center; color:var(--text-dim);
    font-size:15px; max-width:600px; margin-left:auto; margin-right:auto;
  }
  @media (max-width:640px){ .cols{ flex-direction:column; } }
</style>
</head>
<body>
  <div class="demo">
    <span class="label">S2 · WU 2.4</span>
    <div class="card">
      <div class="cols">
        <div class="col">
          <div class="render">
            <iframe class="frame" title="Link" height="30"
              srcdoc="&lt;body style='margin:0;font-family:Times,serif;font-size:16px'&gt;&lt;a href='#'&gt;View product&lt;/a&gt;&lt;/body&gt;"></iframe>
          </div>
          <div class="tagname"><b>&lt;a&gt;</b> — link</div>
        </div>

        <div class="col">
          <div class="render" style="padding:0">
            <img src="https://images.unsplash.com/photo-1598965402089-897ce52e8355?w=200&h=140&fit=crop&q=80"
                 alt="Tecno Spark 20 Pro" style="max-width:100%;height:auto;display:block">
          </div>
          <div class="tagname"><b>&lt;img&gt;</b> — image</div>
        </div>

        <div class="col">
          <div class="render">
            <iframe class="frame" title="Form field" height="88"
              srcdoc="&lt;body style='margin:0;font-family:Times,serif;font-size:15px'&gt;&lt;label&gt;Your name&lt;br&gt;&lt;input type='text'&gt;&lt;/label&gt;&lt;br&gt;&lt;br&gt;&lt;button type='submit'&gt;Submit&lt;/button&gt;&lt;/body&gt;"></iframe>
          </div>
          <div class="tagname"><b>&lt;label&gt; &lt;input&gt; &lt;button&gt;</b> — form field</div>
        </div>
      </div>
    </div>
    <p class="caption">Three tags that let users DO things — navigate, see, and send.</p>
  </div>
</body>
</html>
