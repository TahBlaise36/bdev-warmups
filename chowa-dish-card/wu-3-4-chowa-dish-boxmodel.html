<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chowa — Dish Card · Box Model</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --card: #fff;
      --border: #FED7AA;
      --text: #1C1410;
      --text-dim: #78716C;
      --bg: #FFF7ED;
    }
    [data-theme="dark"] {
      --card: #2C1A12;
      --border: #44271A;
      --text: #FEF3C7;
      --text-dim: #A8786A;
      --bg: #1C1410;
    }

    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 48px 24px;
      transition: background-color 200ms ease, color 200ms ease;
    }

    #themeBtn {
      position: fixed; top: 22px; right: 24px;
      width: 42px; height: 42px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--card);
      font-size: 18px; cursor: pointer; line-height: 1;
      display: grid; place-items: center;
    }

    main { display: flex; flex-direction: column; align-items: center; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      max-width: 340px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
    }
    .card-img {
      position: relative;
      aspect-ratio: 4/3;
      overflow: hidden;
    }
    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .card-body { padding: 20px; }

    .dish-tags { display: flex; gap: 6px; margin-bottom: 10px; }
    .tag {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: .03em;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 99px;
      font-family: 'Poppins', sans-serif;
    }
    .tag-spicy   { background: rgba(234,88,12,.12); color: #C2410C; }
    .tag-special { background: rgba(250,204,21,.18); color: #92400E; }
    [data-theme="dark"] .tag-special { color: #FACC15; }

    .dish-name {
      font-family: 'Poppins', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      margin: 0 0 6px;
    }
    .dish-desc {
      font-size: 0.88rem;
      color: var(--text-dim);
      line-height: 1.55;
      margin: 0 0 16px;
    }

    .card-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .price {
      font-family: 'Poppins', sans-serif;
      font-size: 1.25rem;
      font-weight: 800;
      color: #EA580C;
    }
    .price span {
      font-size: 0.8rem;
      font-weight: 400;
      color: var(--text-dim);
      margin-left: 3px;
    }

    .btn-order {
      background: #EA580C;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 140ms, transform 140ms;
    }
    .btn-order:hover { background: #C2410C; transform: translateY(-1px); }

    .lesson-callout {
      margin-top: 28px;
      max-width: 340px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.9;
      color: var(--text-dim);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
    }
    .lesson-callout code {
      color: #EA580C;
      background: rgba(234,88,12,.10);
      border-radius: 5px;
      padding: 2px 7px;
      font-size: 0.92em;
    }
  </style>
</head>
<body>
  <button id="themeBtn" aria-label="Toggle theme" onclick="toggleTheme()">🌙</button>

  <main>
    <div class="card">
      <div class="card-img">
        <img src="https://images.unsplash.com/photo-1664741662725-bd131742b7b7?w=600&h=400&fit=crop&q=80"
             alt="Ndolé au crabe">
      </div>
      <div class="card-body">
        <div class="dish-tags">
          <span class="tag tag-spicy">Spicy</span>
          <span class="tag tag-special">Signature</span>
        </div>
        <h2 class="dish-name">Ndolé au crabe</h2>
        <p class="dish-desc">Slow-cooked bitterleaf stew with crab,
          smoked fish, and groundnut.</p>
        <div class="card-foot">
          <div class="price">4,500 <span>XAF</span></div>
          <button class="btn-order">Order now</button>
        </div>
      </div>
    </div>

    <div class="lesson-callout">
      <code>padding: 20px</code> — breathing room inside the card<br>
      <code>border-radius: 16px</code> — rounded corners<br>
      <code>margin: 0 0 6px</code> — space between heading and description<br>
      <code>aspect-ratio: 4/3</code> — consistent image height
    </div>
  </main>

  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const dark = html.dataset.theme === 'dark';
      html.dataset.theme = dark ? 'light' : 'dark';
      document.getElementById('themeBtn').textContent = dark ? '🌙' : '☀️';
    }
  </script>
</body>
</html>
