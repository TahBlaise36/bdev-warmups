<!DOCTYPE html>
<!-- ============================================================
     WU 4.2 · Flexbox nav bar — BDev Academy
     Web Foundations track · Section 4 (CSS Layouts)

     The COMPONENT being taught: a full-width fixed BDev nav bar
     built entirely with Flexbox. Three flex children (logo, links,
     actions) sit in their natural positions via space-between —
     no floats, no tables, no hacks.

     Vanilla HTML/CSS only. The only JS is the theme toggle.
     ============================================================ -->
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WU 4.2 · Flexbox nav bar — BDev</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --terracotta: #E2562B;
    --surface: #FAF9F6;
    --surface-2: #FFFFFF;
    --tint: #FDF1EE;
    --line: #E9E5DD;
    --text: #0A0A0B;
    --text-dim: #605D57;
    --text-faint: #A29D94;
    --hero-ink: #0A0A0B;
  }
  html[data-theme="dark"] {
    --terracotta: #EC6B44;
    --surface: #0A0A0B;
    --surface-2: #151518;
    --tint: rgba(226,86,43,.16);
    --line: #26262B;
    --text: #FAF9F6;
    --text-dim: #A4A09A;
    --text-faint: #6C6B70;
    --hero-ink: #050506;
  }

  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--text);
    background: var(--hero-ink);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  a { color: inherit; text-decoration: none; }
  ul { list-style: none; padding: 0; }
  h1,h2,h3 { font-family: 'Space Grotesk', sans-serif; letter-spacing: -0.02em; line-height: 1.1; }

  /* ===== Dark hero backdrop so the nav is the focal point ===== */
  .hero {
    position: relative;
    min-height: 100vh;
    background:
      radial-gradient(900px 420px at 70% -10%, rgba(226,86,43,.18), transparent 70%),
      var(--hero-ink);
    overflow: hidden;
  }
  .hero::before {
    content: "";
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
    background-size: 56px 56px;
    mask-image: radial-gradient(700px 500px at 50% 30%, #000, transparent 80%);
  }

  /* ===== Nav — Flexbox with space-between ===== */
  nav#nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 0 32px;
    height: 64px;
    background: var(--surface);
    border-bottom: 1px solid var(--line);
  }
  html[data-theme="light"] nav#nav { box-shadow: 0 1px 0 rgba(10,10,11,.02), 0 8px 30px rgba(10,10,11,.06); }

  .logo { display: flex; align-items: center; gap: 11px; }
  .logo .mark {
    width: 34px; height: 34px; border-radius: 9px;
    background: var(--terracotta);
    display: grid; place-items: center;
    box-shadow: 0 4px 14px rgba(226,86,43,.4);
  }
  .logo .mark svg { width: 19px; height: 19px; }
  .logo .wordmark {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700; font-size: 21px;
    letter-spacing: -0.02em; color: var(--text);
  }
  .logo .wordmark span { color: var(--terracotta); }

  .nav-links { display: flex; gap: 28px; list-style: none; }
  .nav-links a {
    font-size: 15px; font-weight: 500;
    color: var(--text-dim);
    transition: color 150ms ease;
  }
  .nav-links a:hover { color: var(--text); }

  .nav-actions { display: flex; align-items: center; gap: 10px; }
  .btn-ghost {
    border: 1px solid var(--line); border-radius: 8px;
    padding: 9px 18px; font-size: 14px; font-weight: 600;
    color: var(--text); transition: border-color 150ms ease, background 150ms ease;
  }
  .btn-ghost:hover { border-color: var(--text-faint); }
  .btn-primary {
    background: var(--terracotta); color: #fff;
    border-radius: 8px; padding: 9px 20px;
    font-size: 14px; font-weight: 600;
    box-shadow: 0 4px 14px rgba(226,86,43,.35);
    transition: transform 150ms ease, box-shadow 150ms ease;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(226,86,43,.42); }

  #themeBtn {
    width: 38px; height: 38px; border-radius: 8px;
    border: 1px solid var(--line); background: transparent;
    color: var(--text-dim); cursor: pointer;
    display: grid; place-items: center;
    transition: color 150ms ease, border-color 150ms ease;
  }
  #themeBtn:hover { color: var(--text); border-color: var(--text-faint); }
  #themeBtn svg { width: 18px; height: 18px; }
  #themeBtn .moon { display: none; }
  html[data-theme="dark"] #themeBtn .sun { display: none; }
  html[data-theme="dark"] #themeBtn .moon { display: block; }

  /* ===== Lesson callout ===== */
  .lesson-panel {
    text-align: center;
    max-width: 620px;
    margin: 80px auto 0;
    padding: 0 24px;
    position: relative; z-index: 2;
  }
  .lesson-panel h2 {
    font-size: 34px; font-weight: 700; color: #FAF9F6;
    margin-bottom: 22px;
  }
  html[data-theme="light"] .hero .lesson-panel h2 { color: #FAF9F6; }
  .code-row {
    display: flex; flex-wrap: wrap; gap: 10px;
    justify-content: center; margin-bottom: 22px;
  }
  .lesson-panel code {
    font-family: 'JetBrains Mono', monospace;
    background: var(--tint); color: var(--terracotta);
    border-radius: 6px; padding: 4px 10px; font-size: 0.9rem;
  }
  html[data-theme="light"] .hero .lesson-panel code { background: rgba(226,86,43,.16); }
  .lesson-panel p {
    color: rgba(250,249,246,.72);
    font-size: 15.5px; line-height: 1.65;
  }
  .eyebrow {
    display: inline-block;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px; font-weight: 600; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--terracotta);
    margin-bottom: 14px;
  }
</style>
</head>
<body>
  <div class="hero">
    <nav id="nav">
      <a class="logo" href="#">
        <span class="mark">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M6 5l6 7-6 7" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M13 12h5" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="wordmark">BDev<span>.cm</span></span>
      </a>

      <ul class="nav-links">
        <li><a href="#">Tracks</a></li>
        <li><a href="#">Projects</a></li>
        <li><a href="#">Pricing</a></li>
        <li><a href="#">About</a></li>
      </ul>

      <div class="nav-actions">
        <a href="#" class="btn-ghost">Sign in</a>
        <a href="#" class="btn-primary">Enroll now</a>
        <button id="themeBtn" aria-label="Toggle theme" onclick="toggleTheme()">
          <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>
          </svg>
          <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>
          </svg>
        </button>
      </div>
    </nav>

    <div class="lesson-panel">
      <span class="eyebrow">WU 4.2 · Flexbox</span>
      <h2>Built with Flexbox</h2>
      <div class="code-row">
        <code>display: flex</code>
        <code>justify-content: space-between</code>
        <code>align-items: center</code>
      </div>
      <p>Three flex children — logo, links, actions — each sitting in its natural
      position without floats, tables, or hacks.</p>
    </div>
  </div>

  <script>
    function toggleTheme() {
      const html = document.documentElement;
      html.dataset.theme = html.dataset.theme === 'dark' ? 'light' : 'dark';
    }
  </script>
</body>
</html>
